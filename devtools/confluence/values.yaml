# Base values — DB URL, license path, and ingress host are overridden in devtools-definition

confluence:
  replicaCount: 1

  image:
    repository: atlassian/confluence
    # 9.3.1 hit a startup bug: PluginFrameworkContextListener consistently
    # raced against the async Spring root context bootstrap
    # ("Spring Application context has not been set"), breaking Soy-template
    # rendering (login page, setup wizard) on ~6 of 7 observed boots. Ruled
    # out memory/CPU sizing, plugin cache corruption, and a full clean
    # reinstall (fresh PVC + DB) as causes — identical failure every time.
    # Trying 9.3.2 (next bug-fix release) as a version-specific fix.
    tag: "9.3.2"

  database:
    type: postgresql
    # URL set in devtools-definition after RDS is provisioned
    url: ""
    credentials:
      secretName: confluence-db
      usernameSecretKey: username
      passwordSecretKey: password

  ingress:
    create: true
    className: nginx
    nginx: true
    maxBodySize: 250m
    host: confluence.devopstashtiot.page
    https: false
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "250m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

  volumes:
    localHome:
      persistentVolumeClaim:
        create: true
        storageClassName: gp2
        resources:
          requests:
            storage: 10Gi
    sharedHome:
      persistentVolumeClaim:
        create: true
        accessModes:
          - ReadWriteOnce
        storageClassName: gp2
        resources:
          requests:
            storage: 10Gi
    synchronyHome:
      persistentVolumeClaim:
        create: true
        storageClassName: gp2
        resources:
          requests:
            storage: 2Gi

  # Upstream chart quirk (same as devtools-provision/devtools/bitbucket/values.yaml):
  # some fields (license, resources, service, etc.) are read by the chart's own
  # templates as `.Values.confluence.<field>` (self-prefixed) instead of the
  # normal `.Values.<field>`. Helm strips the outer "confluence:" wrapper when
  # passing values down from this umbrella chart, so those specific fields
  # must be duplicated here to actually reach the subchart. Everything else
  # (database, volumes, ingress) resolves fine unprefixed.
  confluence:
    license:
      secretName: confluence-license
      secretKey: license-key

    resources:
      jvm:
        maxHeap: "1536m"
        minHeap: "1536m"
        reservedCodeCache: "256m"
      container:
        requests:
          cpu: 2000m
          memory: 2Gi
        limits:
          cpu: 3
          memory: 2.5Gi

    # Trusts the Cloudflare Origin CA root so Confluence's own outbound OIDC
    # token-exchange call to rhbk.devopstashtiot.page passes TLS verification
    # instead of failing with "PKIX path building failed" (same root cause and
    # fix as devtools-provision/devtools/bitbucket's/artifactory's
    # additionalCertificates — see templates/trusted-certs.yaml for the full
    # explanation).
    additionalCertificates:
      secretName: confluence-trusted-certs

  synchrony:
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 1.5Gi

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the confluence subchart) — kept under "wrapper" so they never collide with
# the confluence subchart's own top-level key above.
wrapper:
  # Secret placeholders — all overridden in devtools-definition
  confluenceSecrets:
    license: ""
    # SSM Parameter Store path for the license (SecureString). Used instead of
    # `license` above when set, via an ExternalSecret — keeps the license out
    # of git. Requires the external-secrets-operator devtool to be deployed.
    licenseSsmParameter: ""

  # RDS master credentials (SSM SecureString paths) — used only by the
  # additionalInitContainer (see devtools-definition) that ensures this tool's
  # database/role exist on the shared RDS instance. Requires the
  # external-secrets-operator devtool. Set in devtools-definition.
  rdsAdmin:
    usernameSsmParameter: ""
    passwordSsmParameter: ""

  # SSM Parameter Store path (SecureString) to Cloudflare's public Origin CA
  # root cert — same platform-wide value for every devtool, published once by
  # devtools-labs Terraform's devtools-secrets module. Set in devtools-definition.
  trustedCertsSsmParameter: ""

  # Renders every dashboards/*.json file (see templates/dashboards.yaml) as a
  # Grafana-sidecar-discoverable ConfigMap — same mechanism as
  # devtools-provision/devtools/argocd. No dashboards/*.json committed yet:
  # Confluence Data Center has no native Prometheus /metrics endpoint (would
  # need a JMX-to-Prometheus exporter sidecar, not deployed on this
  # platform). Also requires kube-prometheus-stack to be deployed (see
  # devtools-provision/devtools/argocd/values.yaml's grafanaDashboard note).
  grafanaDashboard:
    enabled: false
