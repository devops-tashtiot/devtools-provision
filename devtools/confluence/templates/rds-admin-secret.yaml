{{- if and .Values.rdsAdmin.usernameSsmParameter .Values.rdsAdmin.passwordSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-admin-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: rds-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.rdsAdmin.passwordSsmParameter | quote }}
{{- end }}
