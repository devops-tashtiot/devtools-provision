{{- if .Values.wrapper.confluenceSecrets.license }}
apiVersion: v1
kind: Secret
metadata:
  name: confluence-license
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  license-key: {{ .Values.wrapper.confluenceSecrets.license | quote }}
---
{{- else if .Values.wrapper.confluenceSecrets.licenseSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: confluence-license
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: confluence-license
    creationPolicy: Owner
  data:
    - secretKey: license-key
      remoteRef:
        key: {{ .Values.wrapper.confluenceSecrets.licenseSsmParameter | quote }}
---
{{- end }}
# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create (see devtools-definition/devtools/confluence).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: confluence-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: confluence-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.passwordSsmParameter | quote }}
