# Cloudflare Origin CA root cert — trusted so Confluence's own outbound TLS
# calls to *.devopstashtiot.page pass real certificate verification. Needed
# for the RHBK/Keycloak OIDC SSO login flow specifically: Confluence's
# server-side token exchange with rhbk.devopstashtiot.page (after the
# browser redirect completes) fails with "javax.net.ssl.SSLHandshakeException:
# PKIX path building failed" because ingress-nginx-controller presents a real
# Cloudflare Origin Certificate signed by Cloudflare's own private Origin CA,
# which isn't in any standard JVM trust store. Same cert/root cause as
# devtools-provision/devtools/bitbucket's, artifactory's, and jira's
# trusted-certs.yaml. Sourced from SSM (published once by devtools-labs
# Terraform's devtools-secrets module) rather than a PEM file committed here,
# so the same public root cert isn't duplicated in git across every devtool.
# Wired in via the confluence subchart's own confluence.additionalCertificates
# mechanism (mounts every key in this secret into an init container that
# keytool-imports each into the JVM's cacerts before Confluence starts).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: confluence-trusted-certs
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: confluence-trusted-certs
    creationPolicy: Owner
  data:
    - secretKey: cloudflare-origin-ca-rsa-root.crt
      remoteRef:
        key: {{ .Values.wrapper.trustedCertsSsmParameter | quote }}
