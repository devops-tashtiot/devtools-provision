{{- if .Values.wrapper.oidcClientSecretSsmParameter }}
# Patches oidc.keycloak.clientSecret into the same argocd-secret object
# argocd-admin-secret.yaml already merges into — creationPolicy: Merge only
# adds/updates this one key, same reasoning as that file. configs.cm's
# oidc.config (set in devtools-definition) references this value back via
# ArgoCD's `$<secret>:<key>` substitution syntax: $argocd-secret:oidc.keycloak.clientSecret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-client-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.keycloak.clientSecret
      remoteRef:
        key: {{ .Values.wrapper.oidcClientSecretSsmParameter | quote }}
{{- end }}
