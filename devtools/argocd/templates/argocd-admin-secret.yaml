{{- if .Values.adminPasswordSsmParameter }}
# Patches admin.password/admin.passwordMtime into the argocd-secret object that
# the argo-cd chart itself creates (configs.secret.createSecret, unchanged).
# creationPolicy: Merge only adds/updates these two keys — it never owns or
# deletes the Secret, so ArgoCD's own auto-generated server.secretkey etc. are
# left untouched. The plaintext SSM value is only ever used as template input;
# the default (Replace) template mergePolicy means the raw "password" key
# fetched below never itself lands in the final Secret, only its bcrypt hash.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-password
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
    template:
      data:
        admin.password: '{{ `{{ .password | bcrypt }}` }}'
        admin.passwordMtime: '{{ `{{ now | date "2006-01-02T15:04:05Z" }}` }}'
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.adminPasswordSsmParameter | quote }}
{{- end }}
