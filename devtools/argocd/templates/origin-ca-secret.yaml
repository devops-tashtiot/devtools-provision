{{- if .Values.wrapper.originCaCrtSsmParameter }}
# Syncs the Cloudflare Origin CA cert (the same one ingress-nginx serves as its
# default TLS cert — see clusters-provision/clusters/ingress-nginx/templates/
# origin-cert-secret.yaml) into this namespace so argocd-server can trust it.
#
# Why this is needed: outbound calls this platform's tools make to any
# *.devopstashtiot.page host (e.g. argocd-server's OIDC discovery/token
# verification against https://rhbk.devopstashtiot.page) resolve in-cluster
# to ingress-nginx-controller, which terminates TLS with this Origin CA cert
# — not a publicly-trusted CA. Without it, argocd-server's own outbound HTTP
# client rejects it with "x509: certificate signed by unknown authority",
# and OIDC token verification fails for every token, browser-login and
# client_credentials service accounts alike (see app/v1/argocd/CLAUDE.md in
# devops-api for the SSO-migration issue this was first caught by).
#
# Only the public cert (tls.crt) is needed here — trust anchors don't need
# the private key. server.initContainers (values.yaml) merges this into a
# copy of the image's own CA bundle at pod startup; see that key's comment
# for why a runtime merge instead of a static committed bundle.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-origin-ca
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: argocd-origin-ca
    creationPolicy: Owner
  data:
    - secretKey: ca.crt
      remoteRef:
        key: {{ .Values.wrapper.originCaCrtSsmParameter | quote }}
{{- end }}
