argo-cd:
  global:
    domain: ""  # overridden per environment in devtools-definition

  configs:
    params:
      server.insecure: true
    cm:
      accounts.admin: "apiKey, login"
    repositories:
      devtools-provision:
        url: https://github.com/devops-tashtiot/devtools-provision
        type: git
        name: devtools-provision
      devtools-definition:
        url: https://github.com/devops-tashtiot/devtools-definition
        type: git
        name: devtools-definition
      clusters-provision:
        url: https://github.com/devops-tashtiot/clusters-provision
        type: git
        name: clusters-provision
      clusters-definition:
        url: https://github.com/devops-tashtiot/clusters-definition
        type: git
        name: clusters-definition

  server:
    service:
      type: ClusterIP
    extraArgs:
      - --insecure
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi

  repoServer:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  applicationSet:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  redis:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  redis-ha:
    enabled: false

  dex:
    enabled: false

  notifications:
    enabled: false

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the argo-cd subchart) — kept under "wrapper" so they never collide with the
# argo-cd subchart's own top-level keys above.
wrapper:
  # Ingress for argocd-server, routed through the ingress-nginx + cloudflared
  # devtools. Disabled by default: on EKS, ingress is still terraform-managed
  # (argocd-ingress module) to avoid a duplicate Ingress object owned by two
  # controllers. Enable only for environments (e.g. minikube) where ingress is
  # fully GitOps-managed — see devtools-definition/devtools/argocd/values.yaml.
  ingress:
    enabled: false
    hosts: []

  # SSM Parameter Store path (SecureString) holding the shared admin password
  # (plaintext) — bcrypt-hashed on the fly by templates/argocd-admin-secret.yaml
  # via an ExternalSecret. Requires the external-secrets-operator devtool. Set
  # in devtools-definition.
  adminPasswordSsmParameter: ""

  # SSM Parameter Store path (SecureString) holding the Cloudflare Origin CA
  # root cert — synced into the argocd-tls-certs-cm ConfigMap by
  # templates/trusted-certs.yaml via an ExternalSecret (using its
  # spec.target.manifest field, since repo-server needs a ConfigMap, not a
  # Secret). Same SSM value bitbucket/jira/confluence/artifactory's
  # trusted-certs.yaml already use. Requires the external-secrets-operator
  # devtool. Set in devtools-definition.
  trustedCertsSsmParameter: ""

  # SSM Parameter Store path (SecureString) holding the RHBK-issued OIDC
  # client secret for this ArgoCD instance — synced into argocd-secret's
  # oidc.keycloak.clientSecret key by templates/oidc-secret.yaml via an
  # ExternalSecret. Requires both external-secrets-operator and rhbk (cluster
  # infra) devtools; the OIDC config itself (issuer/clientID, referencing this
  # secret via $argocd-secret:oidc.keycloak.clientSecret) lives in
  # devtools-definition since it's environment-specific. Set in
  # devtools-definition.
  oidcClientSecretSsmParameter: ""

  # Renders every dashboards/*.json file (see templates/dashboards.yaml) as a
  # Grafana-sidecar-discoverable ConfigMap. dashboards/argocd.json is the
  # official community dashboard (grafana.com/dashboards/14584, sourced from
  # https://github.com/argoproj/argo-cd/blob/master/examples/dashboard.json).
  # Disabled by default: this platform doesn't run kube-prometheus-stack yet
  # (see clusters-provision/clusters/kube-prometheus-stack), and even once it
  # does, ArgoCD's own controller/server/repoServer metrics.enabled are still
  # false (see charts/argo-cd/values.yaml) — enabling ServiceMonitor now would
  # fail sync against a cluster that doesn't have the monitoring.coreos.com
  # CRDs yet, the same class of failure devops-api's grafana.enabled avoids
  # (see devtools-provision/devtools/devops-api/values.yaml). Flip this on,
  # enable metrics+serviceMonitor on argo-cd's controller/server/repoServer,
  # and set kube-prometheus-stack's grafana.sidecar.dashboards.searchNamespace
  # to ALL, once that tool is actually deployed.
  grafanaDashboard:
    enabled: false
