apiVersion: v1
kind: Secret
metadata:
  name: xray-db
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  url: {{ .Values.xraySecrets.db.url | quote }}
---
# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create/maintain (see devtools-definition/devtools/xray).
# creationPolicy: Merge only adds/updates these two keys — it never owns or
# deletes the Secret, so it can't race the plain Secret manifest above it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: xray-db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: xray-db
    creationPolicy: Merge
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.rdsAdmin.passwordSsmParameter | quote }}
