# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create (see devtools-definition/devtools/jira).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jira-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: jira-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.rdsAdmin.passwordSsmParameter | quote }}
