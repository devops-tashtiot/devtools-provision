# Cloudflare Origin CA root cert — trusted so Jira's own outbound TLS calls
# to *.devopstashtiot.page pass real certificate verification. Needed for the
# RHBK/Keycloak OIDC SSO login flow specifically: Jira's server-side token
# exchange with rhbk.devopstashtiot.page (after the browser redirect
# completes) fails with "javax.net.ssl.SSLHandshakeException: PKIX path
# building failed" because ingress-nginx-controller presents a real
# Cloudflare Origin Certificate signed by Cloudflare's own private Origin CA,
# which isn't in any standard JVM trust store. Same cert/root cause and fix
# as devtools-provision/devtools/bitbucket's and .../artifactory's
# templates/trusted-certs.yaml. Wired in via the jira subchart's own
# jira.additionalCertificates mechanism (mounts every key in this secret
# into an init container that keytool-imports each into the JVM's cacerts
# before Jira starts).
apiVersion: v1
kind: Secret
metadata:
  name: jira-trusted-certs
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  cloudflare-origin-ca-rsa-root.crt: |
{{ .Files.Get "files/cloudflare-origin-ca-rsa-root.pem" | indent 4 }}
