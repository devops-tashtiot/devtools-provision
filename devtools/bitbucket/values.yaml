# Base values — DB URL and secrets are overridden in devtools-definition

bitbucket:
  replicaCount: 1

  database:
    # URL set in devtools-definition after RDS is provisioned
    url: ""
    driver: "org.postgresql.Driver"
    credentials:
      secretName: bitbucket-db
      usernameSecretKey: username
      passwordSecretKey: password

  ingress:
    create: true
    className: nginx
    nginx: true
    maxBodySize: 250m
    host: bitbucket.devopstashtiot.page
    https: false
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "250m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

  volumes:
    localHome:
      persistentVolumeClaim:
        create: true
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
    sharedHome:
      storageClassName: gp3
      customVolume:
        persistentVolumeClaim:
          claimName: bitbucket-shared-home
      nfsPermissionFixer:
        enabled: false

  bitbucket:
    service:
      type: ClusterIP
      port: 80

    ssh:
      type: ClusterIP

    license:
      secretName: bitbucket-license
      secretKey: license-key

    sysadminCredentials:
      secretName: bitbucket-sysadmin
      usernameSecretKey: username
      passwordSecretKey: password
      displayNameSecretKey: displayName
      emailAddressSecretKey: emailAddress

    additionalEnvironmentVariables:
      - name: OPENSEARCH_JAVA_OPTS
        value: "-Xms256m -Xmx512m"

    resources:
      jvm:
        maxHeap: "768m"
        minHeap: "512m"
      container:
        requests:
          cpu: "500m"
          memory: "3Gi"
        limits:
          cpu: "2"
          memory: "3Gi"

    clustering:
      enabled: false

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the bitbucket subchart) — kept under "wrapper" so they never collide with
# the bitbucket subchart's own top-level key above.
wrapper:
  # Secret placeholders — all overridden in devtools-definition
  bitbucketSecrets:
    license: ""
    # SSM Parameter Store path for the license (SecureString). Used instead of
    # `license` above when set, via an ExternalSecret — keeps the license out
    # of git. Requires the external-secrets-operator devtool to be deployed.
    licenseSsmParameter: ""
    admin:
      username: ""
      displayName: "Bitbucket Admin"
      emailAddress: "admin@example.com"
    # SSM Parameter Store path (SecureString) holding the shared admin password
    # (plaintext). Patched into the bitbucket-sysadmin Secret via an
    # ExternalSecret. Requires the external-secrets-operator devtool.
    adminPasswordSsmParameter: ""

  # RDS master credentials (SSM SecureString paths) — used only by the
  # additionalInitContainer (see devtools-definition) that ensures this tool's
  # database/role exist on the shared RDS instance. Requires the
  # external-secrets-operator devtool. Set in devtools-definition.
  rdsAdmin:
    usernameSsmParameter: ""
    passwordSsmParameter: ""

  # Renders every dashboards/*.json file (see templates/dashboards.yaml) as a
  # Grafana-sidecar-discoverable ConfigMap — same mechanism as
  # devtools-provision/devtools/argocd. No dashboards/*.json committed yet:
  # Bitbucket Data Center has no native Prometheus /metrics endpoint (would
  # need a JMX-to-Prometheus exporter sidecar, not deployed on this
  # platform). Also requires kube-prometheus-stack to be deployed (see
  # devtools-provision/devtools/argocd/values.yaml's grafanaDashboard note).
  grafanaDashboard:
    enabled: false
