{{- if .Values.bitbucketSecrets.license }}
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-license
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  license-key: {{ .Values.bitbucketSecrets.license | quote }}
---
{{- else if .Values.bitbucketSecrets.licenseSsmParameter }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bitbucket-license
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bitbucket-license
    creationPolicy: Owner
  data:
    - secretKey: license-key
      remoteRef:
        key: {{ .Values.bitbucketSecrets.licenseSsmParameter | quote }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-sysadmin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.bitbucketSecrets.admin.username | quote }}
  password: {{ .Values.bitbucketSecrets.admin.password | quote }}
  displayName: {{ .Values.bitbucketSecrets.admin.displayName | quote }}
  emailAddress: {{ .Values.bitbucketSecrets.admin.emailAddress | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-db
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.bitbucketSecrets.db.username | quote }}
  password: {{ .Values.bitbucketSecrets.db.password | quote }}
