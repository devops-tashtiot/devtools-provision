{{- if .Values.wrapper.bitbucketSecrets.license }}
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-license
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  license-key: {{ .Values.wrapper.bitbucketSecrets.license | quote }}
---
{{- else if .Values.wrapper.bitbucketSecrets.licenseSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitbucket-license
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bitbucket-license
    creationPolicy: Owner
  data:
    - secretKey: license-key
      remoteRef:
        key: {{ .Values.wrapper.bitbucketSecrets.licenseSsmParameter | quote }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-sysadmin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.wrapper.bitbucketSecrets.admin.username | quote }}
  displayName: {{ .Values.wrapper.bitbucketSecrets.admin.displayName | quote }}
  emailAddress: {{ .Values.wrapper.bitbucketSecrets.admin.emailAddress | quote }}
---
{{- if .Values.wrapper.bitbucketSecrets.adminPasswordSsmParameter }}
# Patches the "password" key into the bitbucket-sysadmin Secret above.
# creationPolicy: Merge only adds/updates this one key — it never owns or
# deletes the Secret, so it can't race the plain Secret manifest above it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitbucket-sysadmin-password
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bitbucket-sysadmin
    creationPolicy: Merge
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.bitbucketSecrets.adminPasswordSsmParameter | quote }}
---
{{- end }}
# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create (see devtools-definition/devtools/bitbucket).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bitbucket-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: bitbucket-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.passwordSsmParameter | quote }}
