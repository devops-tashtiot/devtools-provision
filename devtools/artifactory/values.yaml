# Base values — DB URL and secrets are overridden in devtools-definition.
#
# Upstream chart quirk (same as devtools-provision/devtools/bitbucket/values.yaml):
# some fields (database, postgresql, nginx, ingress) are read by the chart's
# templates at the subchart's own top level (`.Values.database`), while others
# (admin, license, persistence, resources, javaOpts, replicaCount) are read
# self-prefixed (`.Values.artifactory.admin`). Helm passes everything under
# the outer "artifactory:" key here down into the subchart unprefixed, so the
# self-prefixed fields need an extra inner "artifactory:" level to land right.

# "global" is a reserved Helm key shared automatically with the vendored
# artifactory subchart (charts/artifactory) — this activates its built-in
# copy-custom-certificates init container, sourcing from the
# artifactory-trusted-certs Secret rendered by templates/trusted-certs.yaml.
# See that file's header comment for why (RHBK SSO OIDC PKIX trust failure).
global:
  customCertificates:
    enabled: true
    certificateSecretName: artifactory-trusted-certs

artifactory:
  # Disable the chart's bundled Postgres (Bitnami) and nginx sidecar — this
  # platform reuses the shared RDS instance (see devtools-definition) and
  # terminates ingress at the cluster's own ingress-nginx, not an in-chart nginx.
  postgresql:
    enabled: false
  nginx:
    enabled: false

  # A genuine top-level field on this subchart (distinct from the
  # self-prefixed artifactory.artifactory.* below) — chart default is
  # create: false, meaning the pod runs under the namespace's "default"
  # ServiceAccount. On minikube this doesn't matter (S3 access rides the
  # node's own IMDS role regardless of which ServiceAccount a pod uses); on
  # EKS this needs to be its own distinct ServiceAccount so a Pod Identity
  # association (devtools-labs' eks module) can scope S3 access to just this
  # pod. Harmless on minikube — an extra unused ServiceAccount object.
  serviceAccount:
    create: true
    name: "artifactory"

  database:
    allowNonPostgresql: false
    type: postgresql
    driver: org.postgresql.Driver
    # Referenced via secrets.url below (not the plain `url` field): with
    # unifiedSecretInstallation (chart default) and database.secrets.user/
    # password both set, the chart's own unified-secret template skips
    # rendering db-url from a plain `database.url` value entirely — the
    # statefulset would then reference a key that doesn't exist. Setting
    # secrets.url ourselves sidesteps that gap. Value set in
    # devtools-definition via artifactorySecrets.db.url.
    secrets:
      user:
        name: artifactory-db
        key: username
      password:
        name: artifactory-db
        key: password
      url:
        name: artifactory-db
        key: url

  ingress:
    enabled: true
    className: nginx
    hosts:
      - artifactory.devopstashtiot.page
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"

  artifactory:
    replicaCount: 1

    persistence:
      # Binary blob storage backend — "file-system" keeps blobs on the local
      # PVC below; set to "s3-storage-v3-direct" in devtools-definition to
      # store blobs in S3 instead (etc/work/logs still live on this PVC
      # either way — persistence.type only controls blob storage).
      type: file-system
      size: 20Gi
      storageClassName: gp3
      # For persistence.type: s3-storage-v3-direct (or aws-s3-v3/cluster-s3-storage-v3).
      # useInstanceCredentials: true means no static AWS keys anywhere — the
      # pod picks up the minikube EC2 instance's IAM role via IMDS, same
      # convention as devops-api. bucketName/region are set in
      # devtools-definition once the bucket exists.
      awsS3V3:
        useInstanceCredentials: true
        bucketName: ""
        region: ""
        path: "artifactory/filestore"

    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "2.5Gi"

    javaOpts:
      xms: "1g"
      xmx: "2g"

    # Admin bootstrap comes from a Kubernetes Secret populated in
    # devtools-definition (plaintext or via ExternalSecret from SSM — see
    # templates/secrets.yaml in this umbrella chart). Always wired: every
    # environment gets the shared admin password.
    admin:
      secret: artifactory-admin
      dataKey: password
    # License wiring (secret/dataKey) is set in devtools-definition once a
    # real license is available — left unset here, same pattern as admin
    # above.
    license: {}

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the artifactory subchart) — kept under "wrapper" so they never collide with
# the artifactory subchart's own top-level key above.
wrapper:
  # Secret placeholders — all overridden in devtools-definition
  artifactorySecrets:
    license: ""
    # SSM Parameter Store path for the license (SecureString). Used instead of
    # `license` above when set, via an ExternalSecret — keeps the license out
    # of git. Requires the external-secrets-operator devtool to be deployed.
    licenseSsmParameter: ""
    admin:
      username: "admin"
    # SSM Parameter Store path (SecureString) holding the shared admin password
    # (plaintext). Patched into the artifactory-admin Secret via an
    # ExternalSecret. Requires the external-secrets-operator devtool.
    adminPasswordSsmParameter: ""
    # username/password are NOT set here — the artifactory-db Secret's
    # username/password keys are sourced directly from the rdsAdmin SSM params
    # below (see templates/secrets.yaml's artifactory-db-credentials
    # ExternalSecret). Artifactory connects to Postgres as the shared RDS admin
    # user, same as every other devtool on this platform — only url is a plain
    # value here.
    db:
      url: ""

  # RDS master credentials (SSM SecureString paths) — used only by the
  # customInitContainersBegin hook (see devtools-definition) that ensures this
  # tool's database/role exist on the shared RDS instance. Requires the
  # external-secrets-operator devtool. Set in devtools-definition.
  rdsAdmin:
    usernameSsmParameter: ""
    passwordSsmParameter: ""

  # Renders every dashboards/*.json file (see templates/dashboards.yaml) as a
  # Grafana-sidecar-discoverable ConfigMap — same mechanism as
  # devtools-provision/devtools/argocd. No dashboards/*.json committed yet:
  # Artifactory does expose a Prometheus-format metrics endpoint
  # (system.yaml metrics.enabled), but that hasn't been verified against this
  # deployment or wired into this chart's values — confirm the endpoint
  # actually returns data here before adding a dashboard, or it'll just
  # render empty. Also requires kube-prometheus-stack to be deployed (see
  # devtools-provision/devtools/argocd/values.yaml's grafanaDashboard note).
  grafanaDashboard:
    enabled: false
