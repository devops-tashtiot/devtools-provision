# Cloudflare Origin CA root cert — trusted so Artifactory's own outbound TLS
# calls to *.devopstashtiot.page pass real certificate verification. Needed
# for the RHBK/Keycloak OIDC SSO login flow specifically: Artifactory's
# server-side token/userinfo exchange with rhbk.devopstashtiot.page (after
# the browser redirect completes) was failing with
# "javax.net.ssl.SSLHandshakeException: PKIX path building failed" because
# ingress-nginx-controller presents a real Cloudflare Origin Certificate
# signed by Cloudflare's own private Origin CA, which isn't in any standard
# JVM trust store. Same cert/root cause as devtools-provision/devtools/
# bitbucket's, jira's, and confluence's trusted-certs.yaml. Sourced from SSM
# (published once by devtools-labs Terraform's devtools-secrets module)
# rather than a PEM file committed here, so the same public root cert isn't
# duplicated in git across every devtool. Wired in via the artifactory
# subchart's built-in global.customCertificates mechanism (copies every
# non-".key" file in this secret into
# $JFROG_HOME/artifactory/var/etc/security/keys/trusted).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-trusted-certs
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-trusted-certs
    creationPolicy: Owner
  data:
    - secretKey: cloudflare-origin-ca-rsa-root.crt
      remoteRef:
        key: {{ .Values.wrapper.trustedCertsSsmParameter | quote }}
