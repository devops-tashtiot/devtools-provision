{{- if .Values.wrapper.artifactorySecrets.license }}
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-license
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  artifactory.lic: {{ .Values.wrapper.artifactorySecrets.license | quote }}
---
{{- else if .Values.wrapper.artifactorySecrets.licenseSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-license
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-license
    creationPolicy: Owner
  data:
    - secretKey: artifactory.lic
      remoteRef:
        key: {{ .Values.wrapper.artifactorySecrets.licenseSsmParameter | quote }}
---
{{- end }}
{{- if .Values.wrapper.artifactorySecrets.admin.password }}
# Composite "username@ip=password" bootstrap.creds format required by the
# artifactory chart's admin.secret/dataKey mount (see artifactory-statefulset.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  password: {{ printf "%s@127.0.0.1=%s" .Values.wrapper.artifactorySecrets.admin.username .Values.wrapper.artifactorySecrets.admin.password | quote }}
---
{{- else if .Values.wrapper.artifactorySecrets.adminPasswordSsmParameter }}
# Same composite format, built via ExternalSecret templating so the raw
# password never has to be committed — only the SSM path is.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-admin
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-admin
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: {{ printf "%s@127.0.0.1={{ .rawPassword }}" .Values.wrapper.artifactorySecrets.admin.username | quote }}
  data:
    - secretKey: rawPassword
      remoteRef:
        key: {{ .Values.wrapper.artifactorySecrets.adminPasswordSsmParameter | quote }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-db
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  url: {{ .Values.wrapper.artifactorySecrets.db.url | quote }}
---
# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create/maintain (see devtools-definition/devtools/artifactory).
# creationPolicy: Merge only adds/updates these two keys — it never owns or
# deletes the Secret, so it can't race the plain Secret manifest above it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-db
    creationPolicy: Merge
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.passwordSsmParameter | quote }}
