{{- if .Values.artifactorySecrets.license }}
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-license
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  artifactory.lic: {{ .Values.artifactorySecrets.license | quote }}
---
{{- else if .Values.artifactorySecrets.licenseSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-license
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-license
    creationPolicy: Owner
  data:
    - secretKey: artifactory.lic
      remoteRef:
        key: {{ .Values.artifactorySecrets.licenseSsmParameter | quote }}
---
{{- end }}
{{- if .Values.artifactorySecrets.admin.password }}
# Composite "username@ip=password" bootstrap.creds format required by the
# artifactory chart's admin.secret/dataKey mount (see artifactory-statefulset.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  password: {{ printf "%s@127.0.0.1=%s" .Values.artifactorySecrets.admin.username .Values.artifactorySecrets.admin.password | quote }}
---
{{- else if .Values.artifactorySecrets.adminPasswordSsmParameter }}
# Same composite format, built via ExternalSecret templating so the raw
# password never has to be committed — only the SSM path is.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: artifactory-admin
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: artifactory-admin
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: {{ printf "%s@127.0.0.1={{ .rawPassword }}" .Values.artifactorySecrets.admin.username | quote }}
  data:
    - secretKey: rawPassword
      remoteRef:
        key: {{ .Values.artifactorySecrets.adminPasswordSsmParameter | quote }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: artifactory-db
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.artifactorySecrets.db.username | quote }}
  password: {{ .Values.artifactorySecrets.db.password | quote }}
  url: {{ .Values.artifactorySecrets.db.url | quote }}
