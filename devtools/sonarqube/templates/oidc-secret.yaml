# sonar-auth-oidc's clientSecret.secured is only settable via a
# sonar.properties-format file loaded from a Secret's "secret.properties" key
# (the chart's sonarSecretProperties value) — there's no direct
# secretKeyRef-style field for it, unlike most other devtools' secrets. The
# ExternalSecret template below renders that one-line properties file from
# the raw SSM value using ESO's own templating, so the plaintext secret is
# never written to git either way.
#
# Same SSM parameter clusters-provision/clusters/rhbk's
# set-sonarqube-client-secret-job.yaml reads to set the real value on the
# RHBK/Keycloak side — one source of truth, no manual sync needed.
{{- if .Values.oidcClientSecretSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-oidc-secret-properties
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: sonarqube-oidc-secret-properties
    creationPolicy: Owner
    template:
      data:
        secret.properties: |
          sonar.auth.oidc.clientSecret.secured={{ `{{ .clientSecret }}` }}
  data:
    - secretKey: clientSecret
      remoteRef:
        key: {{ .Values.oidcClientSecretSsmParameter | quote }}
{{- end }}
