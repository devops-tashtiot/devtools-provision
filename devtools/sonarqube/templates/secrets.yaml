# SonarQube's chart reads setAdminPassword.passwordSecretName as a Secret
# with "currentPassword" (the out-of-the-box default, "admin") and "password"
# (the new admin password) keys, and applies it at startup — no manual setup
# wizard needed. currentPassword is a fixed, non-secret upstream default, so
# it's safe as a plain stringData value here.
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-admin-password
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  currentPassword: "admin"
---
{{- if .Values.wrapper.adminPasswordSsmParameter }}
# Patches the "password" key into the sonarqube-admin-password Secret above.
# creationPolicy: Merge only adds/updates this one key — it never owns or
# deletes the Secret, so it can't race the plain Secret manifest above it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-admin-password-patch
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: sonarqube-admin-password
    creationPolicy: Merge
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.adminPasswordSsmParameter | quote }}
---
{{- end }}
# Same RDS admin credentials as rds-admin-credentials — every devtool
# connects to Postgres as the shared admin user, so there's no separate
# per-tool role to create (see devtools-definition/devtools/sonarqube).
# Only the "password" key is actually consumed by the chart's jdbcOverwrite
# (jdbcUsername is a plaintext value in values.yaml — this chart has no
# secret-backed username field), but username is included for consistency
# with the other devtools' *-db secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-db
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: sonarqube-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.wrapper.rdsAdmin.passwordSsmParameter | quote }}
