# Values that are the same across every environment.
# AWS region/credentials for the ClusterSecretStore are environment-specific
# and live in devtools-definition/devtools/external-secrets-operator/values.yaml.

external-secrets:
  installCRDs: true
  replicaCount: 1

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  certController:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

# Rendered by this umbrella chart's own templates/ (not the subchart) —
# gives every namespace a shared AWS Parameter Store backend with no
# static credentials: ESO's pod picks up the minikube EC2 instance's IAM
# role via IMDS (the instance's http_put_response_hop_limit=2 setting
# exists specifically so a containerized process can reach it).
awsParameterStore:
  region: "" # set in devtools-definition
