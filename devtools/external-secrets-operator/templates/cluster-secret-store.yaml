{{- if .Values.awsParameterStore.region }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.awsParameterStore.region | quote }}
      # No `auth:` block — ESO falls back to the AWS SDK default credential
      # chain, which resolves to the minikube EC2 instance's IAM role via
      # IMDS. No static access keys anywhere in this chart or git history.
{{- end }}
